<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Vision Tutorials | Ali Asghar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* جلوگیری از اسکرول برای تمرکز بیشتر */
        }

        /* افکت‌های نوری شناور در پس‌زمینه */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary);
            filter: blur(150px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: 0 auto 30px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .cta-button {
            display: inline-block;
            text-decoration: none;
            background: #fff;
            color: #0f172a;
            padding: 18px 40px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.2);
            background: var(--primary);
            color: white;
        }

        .github-label {
            margin-top: 25px;
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: white;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .main-card { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <a href="index.html" class="back-home">← Back to Home</a>

    <main class="main-card">
        <div class="icon-box">👁️</div>
        <h1>Computer Vision<br>Mastery</h1>
        <p>Ready to dive into the world of pixels? Access my complete collection of tutorials, implementations, and deep learning projects.</p>
        
        <a href="https://github.com/aliasgharebrahimi/" target="_blank" class="cta-button">
            Explore on GitHub
        </a>

        <span class="github-label">github.com/aliasgharebrahimi</span>
    </main>

</body>
</html>
